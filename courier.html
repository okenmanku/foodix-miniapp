<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Food IX — Kuryer</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'Segoe UI',sans-serif; background:#111; color:#fff; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* MAP */
#mapWrap { flex:1; position:relative; min-height:0; }
#ymap { width:100%; height:100%; border:none; display:block; }
.map-loading {
  position:absolute; inset:0; background:rgba(0,0,0,.8);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  z-index:20;
}
.map-loading.hide { display:none; }
.spinner { width:44px; height:44px; border:4px solid rgba(255,255,255,.15); border-top-color:#D01B1B; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.map-loading p { font-size:13px; color:#aaa; text-align:center; padding:0 20px; }

.my-loc-btn {
  position:absolute; top:12px; right:12px;
  width:40px; height:40px; background:#fff; border:none; border-radius:50%;
  font-size:18px; cursor:pointer; box-shadow:0 2px 10px rgba(0,0,0,.5);
  display:flex; align-items:center; justify-content:center; z-index:30;
}

/* BOTTOM PANEL */
.panel { background:#0d0d0d; border-top:1px solid #222; flex-shrink:0; }
.panel-inner { padding:12px 14px 6px; }

.p-title { font-size:15px; font-weight:800; color:#fff; margin-bottom:10px; }

.cards { display:flex; gap:8px; margin-bottom:10px; }
.card { flex:1; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:9px 8px; text-align:center; }
.card-lbl { font-size:10px; color:#555; margin-bottom:3px; }
.card-val { font-size:16px; font-weight:800; }
.green { color:#4CAF50; }
.orange { color:#FF9800; }
.red { color:#D01B1B; }
.white { color:#fff; }

.row { display:flex; align-items:flex-start; gap:9px; padding:7px 0; border-bottom:1px solid #1a1a1a; }
.row:last-of-type { border:none; }
.row-icon { font-size:16px; width:24px; flex-shrink:0; margin-top:1px; }
.row-body { flex:1; }
.row-lbl { font-size:10px; color:#555; }
.row-val { font-size:13px; font-weight:600; }

.accept-btn {
  width:100%; padding:14px; margin:10px 0 4px;
  background:#D01B1B; color:#fff; border:none;
  border-radius:13px; font-size:15px; font-weight:800; cursor:pointer;
  transition:opacity .15s;
}
.accept-btn:disabled { background:#333; color:#666; cursor:not-allowed; }
.accept-btn:not(:disabled):active { opacity:.85; }

.status-bar { display:flex; align-items:center; gap:7px; padding:4px 14px 10px; }
.dot { width:7px; height:7px; border-radius:50%; background:#4CAF50; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.dot-txt { font-size:11px; color:#444; }
</style>
</head>
<body>

<div id="mapWrap">
  <iframe id="ymap" src="about:blank" allowfullscreen></iframe>
  <div class="map-loading" id="loading">
    <div class="spinner"></div>
    <p id="loadTxt">GPS aniqlanmoqda...<br>Iltimos kuting</p>
  </div>
  <button class="my-loc-btn" onclick="relocate()">🎯</button>
</div>

<div class="panel">
  <div class="panel-inner">
    <div class="p-title">🛵 Buyurtma <span id="oid">#—</span></div>

    <div class="cards">
      <div class="card">
        <div class="card-lbl">☕ Cafegacha</div>
        <div class="card-val green" id="d_cafe">—</div>
        <div class="card-lbl">km</div>
      </div>
      <div class="card">
        <div class="card-lbl">📍 Mijozgacha</div>
        <div class="card-val orange" id="d_user">—</div>
        <div class="card-lbl">km</div>
      </div>
      <div class="card">
        <div class="card-lbl">💰 Dastavka</div>
        <div class="card-val white" id="d_fee">—</div>
        <div class="card-lbl">so'm</div>
      </div>
    </div>

    <div class="row">
      <div class="row-icon">📞</div>
      <div class="row-body">
        <div class="row-lbl">Mijoz telefoni</div>
        <div class="row-val" id="r_phone">—</div>
      </div>
    </div>
    <div class="row">
      <div class="row-icon">💬</div>
      <div class="row-body">
        <div class="row-lbl">Izoh</div>
        <div class="row-val" id="r_comment">—</div>
      </div>
    </div>

    <button class="accept-btn" id="acceptBtn" onclick="accept()" disabled>
      📍 GPS kutilmoqda...
    </button>
  </div>
  <div class="status-bar">
    <div class="dot"></div>
    <div class="dot-txt" id="statusTxt">Ulangan</div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand(); tg.setHeaderColor('#0d0d0d');

// URL params
const P = new URLSearchParams(window.location.search);
const ORDER_ID   = parseInt(P.get('order') || '0');
const USER_LAT   = parseFloat(P.get('ulat')  || '41.310');
const USER_LON   = parseFloat(P.get('ulon')  || '69.280');
const USER_PHONE = decodeURIComponent(P.get('phone')   || '');
const COMMENT    = decodeURIComponent(P.get('comment') || '');
const FEE        = parseInt(P.get('fee') || '0');

// Cafe koordinata (config.py bilan mos bo'lishi kerak!)
const CAFE_LAT = 41.2995, CAFE_LON = 69.2401;

let myLat = null, myLon = null;

// Fill static info
document.getElementById('oid').textContent = '#' + ORDER_ID;
document.getElementById('r_phone').textContent = USER_PHONE || '—';
document.getElementById('r_comment').textContent = COMMENT || '—';
document.getElementById('d_fee').textContent = FEE === 0 ? 'Bepul' : FEE.toLocaleString('uz-UZ');

function haversine(a, b, c, d) {
  const R=6371, dLat=(c-a)*Math.PI/180, dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.asin(Math.sqrt(x));
}

function colorClass(km) {
  return km < 1 ? 'green' : km < 3 ? 'orange' : 'red';
}

function updateDist() {
  if (myLat === null) return;
  const toCafe = haversine(myLat, myLon, CAFE_LAT, CAFE_LON);
  const toUser = haversine(myLat, myLon, USER_LAT, USER_LON);
  const ce = document.getElementById('d_cafe');
  const ue = document.getElementById('d_user');
  ce.textContent = toCafe.toFixed(1);
  ue.textContent = toUser.toFixed(1);
  ce.className = 'card-val ' + colorClass(toCafe);
  ue.className = 'card-val ' + colorClass(toUser);
}

function loadYandexMap(lat, lon) {
  // Yandex Maps: kuryer dan cafegacha + cafeden usergacha marshrut
  // 1-nuqta: kuryer, 2-nuqta: cafe, 3-nuqta: user
  const url = `https://yandex.uz/maps/?ll=${lon},${lat}&z=13`
    + `&mode=routes`
    + `&rtext=${lat},${lon}~${CAFE_LAT},${CAFE_LON}~${USER_LAT},${USER_LON}`
    + `&rtt=auto&ruri=~~`;
  document.getElementById('ymap').src = url;

  // Map yuklanganini kutish
  document.getElementById('ymap').onload = () => {
    document.getElementById('loading').classList.add('hide');
  };
  // 4 sekunddan keyin majburan yashirish
  setTimeout(() => document.getElementById('loading').classList.add('hide'), 4000);
}

function getLocation() {
  if (!navigator.geolocation) {
    document.getElementById('loadTxt').textContent = '❌ GPS qo\'llab-quvvatlanmaydi';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      myLat = pos.coords.latitude;
      myLon = pos.coords.longitude;
      updateDist();
      loadYandexMap(myLat, myLon);
      const btn = document.getElementById('acceptBtn');
      btn.disabled = false;
      btn.textContent = '🚴 Qabul qilaman';
      document.getElementById('statusTxt').textContent =
        `📍 ${myLat.toFixed(5)}, ${myLon.toFixed(5)}`;
    },
    err => {
      document.getElementById('loadTxt').innerHTML =
        '❌ GPS ruxsati berilmadi<br><br>Telegram → Sozlamalar → Ruxsatlar → Geolokatsiya';
      document.getElementById('acceptBtn').textContent = '❌ GPS kerak';
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 5000 }
  );
}

function relocate() {
  document.getElementById('loading').classList.remove('hide');
  document.getElementById('loadTxt').textContent = 'Yangilanmoqda...';
  getLocation();
}

function accept() {
  if (!myLat) return;
  const btn = document.getElementById('acceptBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Yuborilmoqda...';
  tg.sendData(JSON.stringify({
    type: 'courier',
    order_id: ORDER_ID,
    lat: myLat,
    lon: myLon
  }));
}

// Start
getLocation();
setInterval(updateDist, 15000);
</script>
</body>
</html>
