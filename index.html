<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Food IX</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --red: #D01B1B;
  --red-dark: #A81414;
  --gold: #F5A623;
  --white: #FFFFFF;
  --bg: #F7F7F7;
  --card: #FFFFFF;
  --text: #111111;
  --text2: #666666;
  --border: #EBEBEB;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif; background:var(--bg); color:var(--text); }

/* PAGES */
.page { position:fixed; inset:0; display:flex; flex-direction:column; transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1); background:var(--bg); }
.page.active { transform:translateX(0); }
.page.prev   { transform:translateX(-30%); }

/* HEADER */
.hdr { background:var(--red); padding:env(safe-area-inset-top,0) 0 0; flex-shrink:0; }
.hdr-inner { display:flex; align-items:center; gap:10px; padding:13px 16px 12px; }
.hdr-back { width:32px; height:32px; background:rgba(255,255,255,.2); border:none; border-radius:50%; color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.hdr-logo { display:flex; align-items:center; gap:9px; flex:1; }
.hdr-icon { width:36px; height:36px; background:#fff; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.hdr-title { color:#fff; font-size:20px; font-weight:800; letter-spacing:-.3px; }
.hdr-title span { opacity:.65; font-weight:400; }
.hdr-lang { background:rgba(255,255,255,.2); border:none; color:#fff; padding:5px 13px; border-radius:20px; font-size:13px; font-weight:700; cursor:pointer; }
.hdr-cart-btn { background:rgba(255,255,255,.2); border:none; color:#fff; padding:6px 12px; border-radius:20px; font-size:13px; font-weight:700; cursor:pointer; position:relative; white-space:nowrap; }
.cart-badge { position:absolute; top:-4px; right:-4px; width:18px; height:18px; background:#fff; color:var(--red); border-radius:50%; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; }

/* BODY */
.body { flex:1; overflow-y:auto; overscroll-behavior:contain; }
.body::-webkit-scrollbar { display:none; }

/* HERO */
.hero { background:linear-gradient(160deg, #1a0000, var(--red)); padding:20px 18px 26px; color:#fff; }
.hero-logo { font-size:32px; font-weight:900; font-style:italic; color:#fff; letter-spacing:-1px; }
.hero-logo span { color:var(--gold); }
.hero-sub { font-size:13px; color:rgba(255,255,255,.7); margin-top:4px; }
.hero-tag { display:inline-block; margin-top:10px; background:var(--gold); color:#111; font-size:12px; font-weight:800; padding:4px 12px; border-radius:20px; letter-spacing:.3px; }

/* SEARCH */
.search-wrap { padding:14px 14px 0; }
.search { display:flex; align-items:center; gap:10px; background:var(--card); border-radius:14px; padding:11px 14px; box-shadow:var(--shadow); }
.search input { border:none; outline:none; flex:1; font-size:14px; color:var(--text); background:transparent; }
.search input::placeholder { color:var(--text2); }

/* CATS */
.cats-wrap { padding:14px 0 4px; }
.cats-scroll { display:flex; gap:10px; padding:0 14px; overflow-x:auto; scrollbar-width:none; }
.cats-scroll::-webkit-scrollbar { display:none; }
.cat-pill { flex-shrink:0; display:flex; align-items:center; gap:6px; background:var(--card); border:2px solid var(--border); border-radius:24px; padding:8px 14px; font-size:12px; font-weight:700; cursor:pointer; transition:all .18s; white-space:nowrap; }
.cat-pill.on { background:var(--red); border-color:var(--red); color:#fff; }

/* SECTION */
.sec-title { padding:14px 14px 8px; font-size:16px; font-weight:800; }

/* GRID */
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 10px 110px; }

/* CARD */
.pcard { background:var(--card); border-radius:16px; overflow:hidden; box-shadow:var(--shadow); cursor:pointer; transition:transform .15s; }
.pcard:active { transform:scale(.96); }
.pcard-img { width:100%; height:100px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; font-size:46px; position:relative; }
.pcard-badge { position:absolute; top:7px; right:7px; background:var(--red); color:#fff; font-size:10px; font-weight:800; padding:2px 7px; border-radius:10px; }
.pcard-body { padding:9px 11px 11px; }
.pcard-name { font-size:12px; font-weight:700; line-height:1.3; margin-bottom:3px; }
.pcard-desc { font-size:10px; color:var(--text2); margin-bottom:7px; line-height:1.4; }
.pcard-foot { display:flex; align-items:center; justify-content:space-between; }
.pcard-price { font-size:13px; font-weight:800; color:var(--red); }
.add-btn { width:28px; height:28px; background:var(--red); border:none; border-radius:8px; color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.qty-ctrl { display:flex; align-items:center; gap:4px; }
.qty-btn { width:24px; height:24px; border-radius:6px; border:none; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.qty-minus { background:var(--bg); }
.qty-plus  { background:var(--red); color:#fff; }
.qty-num   { font-size:13px; font-weight:800; min-width:16px; text-align:center; }

/* CART BAR */
.cart-bar { position:fixed; bottom:0; left:0; right:0; background:var(--red); padding:12px 16px; padding-bottom:max(12px,env(safe-area-inset-bottom)); display:flex; align-items:center; justify-content:space-between; transform:translateY(120%); transition:transform .3s cubic-bezier(.34,1.56,.64,1); z-index:200; box-shadow:0 -4px 24px rgba(208,27,27,.4); }
.cart-bar.show { transform:translateY(0); }
.cart-bar-info { color:#fff; }
.cart-bar-cnt { font-size:11px; opacity:.8; }
.cart-bar-tot { font-size:17px; font-weight:800; }
.cart-bar-btn { background:#fff; color:var(--red); border:none; border-radius:12px; padding:10px 20px; font-size:14px; font-weight:800; cursor:pointer; }

/* DETAIL */
.pd-img { width:100%; height:200px; background:linear-gradient(160deg,#ffe0e0,#f7f7f7); display:flex; align-items:center; justify-content:center; font-size:88px; flex-shrink:0; }
.pd-body { padding:18px 18px 110px; }
.pd-name { font-size:20px; font-weight:900; margin-bottom:5px; }
.pd-desc { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:14px; }
.pd-price { font-size:24px; font-weight:900; color:var(--red); margin-bottom:20px; }
.pd-qty-wrap { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
.pd-qty-btn { width:42px; height:42px; border-radius:12px; border:none; font-size:22px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.pd-minus { background:var(--bg); }
.pd-plus  { background:var(--red); color:#fff; }
.pd-num   { font-size:22px; font-weight:800; min-width:30px; text-align:center; }
.pd-add-btn { width:100%; padding:15px; background:var(--red); color:#fff; border:none; border-radius:15px; font-size:15px; font-weight:800; cursor:pointer; }

/* CART PAGE */
.cart-item { background:var(--card); margin:0 12px 10px; border-radius:15px; padding:13px 15px; display:flex; align-items:center; gap:11px; box-shadow:var(--shadow); }
.ci-icon { font-size:34px; width:50px; height:50px; background:var(--bg); border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.ci-info { flex:1; }
.ci-name { font-size:13px; font-weight:700; margin-bottom:3px; }
.ci-price { font-size:12px; color:var(--red); font-weight:700; }
.ci-ctrl { display:flex; align-items:center; gap:7px; }
.ci-btn { width:28px; height:28px; border-radius:8px; border:none; font-size:17px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.ci-minus { background:var(--bg); }
.ci-plus  { background:var(--red); color:#fff; }
.ci-num   { font-size:14px; font-weight:800; min-width:16px; text-align:center; }
.cart-summary { background:var(--card); margin:0 12px; border-radius:15px; padding:15px; box-shadow:var(--shadow); }
.cs-row { display:flex; justify-content:space-between; font-size:13px; color:var(--text2); margin-bottom:7px; }
.cs-total { display:flex; justify-content:space-between; font-size:17px; font-weight:800; border-top:1px solid var(--border); padding-top:11px; margin-top:3px; }
.checkout-btn { display:block; margin:12px 12px 0; width:calc(100% - 24px); padding:15px; background:var(--red); color:#fff; border:none; border-radius:15px; font-size:15px; font-weight:800; cursor:pointer; text-align:center; }
.clear-btn { display:block; margin:10px 12px 100px; width:calc(100% - 24px); padding:13px; background:transparent; color:#999; border:2px solid var(--border); border-radius:15px; font-size:13px; font-weight:700; cursor:pointer; text-align:center; }
.empty-cart { text-align:center; padding:60px 20px; }
.empty-cart .ei { font-size:56px; display:block; margin-bottom:14px; }
.go-btn { display:inline-block; margin-top:18px; background:var(--red); color:#fff; border:none; padding:12px 28px; border-radius:13px; font-size:14px; font-weight:700; cursor:pointer; }

/* ORDER */
.order-form { padding:16px 16px 120px; }
.form-group { margin-bottom:15px; }
.form-label { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; display:block; }
.form-input { width:100%; padding:12px 14px; background:var(--card); border:2px solid var(--border); border-radius:13px; font-size:14px; color:var(--text); outline:none; transition:border-color .18s; }
.form-input:focus { border-color:var(--red); }
.form-textarea { width:100%; padding:12px 14px; background:var(--card); border:2px solid var(--border); border-radius:13px; font-size:14px; color:var(--text); outline:none; resize:none; height:75px; font-family:inherit; transition:border-color .18s; }
.form-textarea:focus { border-color:var(--red); }
.oip { background:var(--card); border-radius:15px; padding:13px; margin-bottom:15px; box-shadow:var(--shadow); }
.oip-row { display:flex; justify-content:space-between; font-size:12px; padding:3px 0; border-bottom:1px solid var(--border); color:var(--text2); }
.oip-row:last-child { border:none; }
.oip-total { display:flex; justify-content:space-between; font-size:15px; font-weight:800; padding-top:9px; margin-top:3px; border-top:2px solid var(--border); }
.place-btn { width:100%; padding:16px; background:var(--red); color:#fff; border:none; border-radius:15px; font-size:15px; font-weight:800; cursor:pointer; margin-top:6px; }

/* SUCCESS */
.success-pg { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px; }
.success-anim { font-size:78px; margin-bottom:18px; animation:pop .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes pop { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }
.success-ttl { font-size:24px; font-weight:900; color:var(--red); margin-bottom:9px; }
.success-txt { font-size:14px; color:var(--text2); line-height:1.6; margin-bottom:30px; }
.success-back { background:var(--red); color:#fff; border:none; padding:13px 38px; border-radius:15px; font-size:15px; font-weight:700; cursor:pointer; }

/* TOAST */
.toast { position:fixed; top:80px; left:50%; transform:translateX(-50%) translateY(-20px); background:#111; color:#fff; padding:9px 20px; border-radius:24px; font-size:13px; font-weight:600; opacity:0; transition:all .25s; z-index:999; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- PAGE: HOME -->
<div class="page active" id="pg-home">
  <div class="hdr">
    <div class="hdr-inner">
      <div class="hdr-logo">
        <div class="hdr-icon">🍽️</div>
        <div class="hdr-title">Food <span>IX</span></div>
      </div>
      <button class="hdr-lang" onclick="toggleLang()" id="langBtn">RU</button>
      <button class="hdr-cart-btn" onclick="goPage('pg-cart')">
        🛒 <span id="hdr-cart-lbl">Savatcha</span>
        <div class="cart-badge" id="hdr-badge" style="display:none">0</div>
      </button>
    </div>
  </div>
  <div class="body">
    <div class="hero">
      <div class="hero-logo"><span>Food</span> ix</div>
      <div class="hero-sub" id="hero-sub">Кафеси • Тез, маззали, сиз учун!</div>
      <div class="hero-tag" id="hero-tag">🚀 Tez yetkazib berish</div>
    </div>
    <div class="search-wrap">
      <div class="search">
        <span>🔍</span>
        <input id="searchInput" placeholder="Taom qidiring..." oninput="filterMenu()">
      </div>
    </div>
    <div class="cats-wrap">
      <div class="cats-scroll" id="catsList"></div>
    </div>
    <div class="sec-title" id="secTitle">Barcha taomlar</div>
    <div class="grid" id="menuGrid"></div>
  </div>
  <div class="cart-bar" id="cartBar">
    <div class="cart-bar-info">
      <div class="cart-bar-cnt" id="barCnt"></div>
      <div class="cart-bar-tot" id="barTot"></div>
    </div>
    <button class="cart-bar-btn" id="barBtn" onclick="goPage('pg-cart')">Savat</button>
  </div>
</div>

<!-- PAGE: DETAIL -->
<div class="page" id="pg-detail">
  <div class="hdr">
    <div class="hdr-inner">
      <button class="hdr-back" onclick="goBack()">‹</button>
      <div class="hdr-title" id="pd-hdr-title" style="font-size:15px"></div>
    </div>
  </div>
  <div class="body">
    <div class="pd-img" id="pd-img"></div>
    <div class="pd-body">
      <div class="pd-name" id="pd-name"></div>
      <div class="pd-desc" id="pd-desc"></div>
      <div class="pd-price" id="pd-price"></div>
      <div class="pd-qty-wrap">
        <button class="pd-qty-btn pd-minus" onclick="pdChange(-1)">−</button>
        <div class="pd-num" id="pd-num">1</div>
        <button class="pd-qty-btn pd-plus" onclick="pdChange(1)">+</button>
      </div>
      <button class="pd-add-btn" id="pd-add-btn" onclick="pdAddToCart()"></button>
    </div>
  </div>
</div>

<!-- PAGE: CART -->
<div class="page" id="pg-cart">
  <div class="hdr">
    <div class="hdr-inner">
      <button class="hdr-back" onclick="goBack()">‹</button>
      <div class="hdr-title" id="cart-hdr-title">🛒 Savatcha</div>
    </div>
  </div>
  <div class="body" id="cartBody"></div>
</div>

<!-- PAGE: ORDER -->
<div class="page" id="pg-order">
  <div class="hdr">
    <div class="hdr-inner">
      <button class="hdr-back" onclick="goBack()">‹</button>
      <div class="hdr-title" id="order-hdr-title">📋 Buyurtma</div>
    </div>
  </div>
  <div class="body">
    <div class="order-form">
      <div class="oip" id="oip"></div>
      <div class="form-group">
        <label class="form-label" id="lbl-phone">📞 Telefon</label>
        <input class="form-input" id="inp-phone" type="tel" placeholder="+998 90 000 00 00">
      </div>
      <div class="form-group">
        <label class="form-label" id="lbl-address">📍 Manzil</label>
        <input class="form-input" id="inp-address" placeholder="Ko'cha, uy raqami">
      </div>
      <div class="form-group">
        <label class="form-label" id="lbl-comment">💬 Izoh</label>
        <textarea class="form-textarea" id="inp-comment" placeholder="Qo'shimcha izoh..."></textarea>
      </div>
      <button class="place-btn" id="place-btn" onclick="placeOrder()">✅ Buyurtma berish</button>
    </div>
  </div>
</div>

<!-- PAGE: SUCCESS -->
<div class="page" id="pg-success">
  <div class="success-pg">
    <div class="success-anim">🎉</div>
    <div class="success-ttl" id="suc-ttl">Buyurtma qabul qilindi!</div>
    <div class="success-txt" id="suc-txt">Tez orada siz bilan bog'lanamiz. Rahmat! 🙏</div>
    <button class="success-back" id="suc-btn" onclick="resetOrder()">Bosh sahifaga</button>
  </div>
</div>

<div class="toast" id="toast"></div>

let lang='uz', activeCat='all', cart={}, pdProduct=null, pdQty=1, pageStack=['pg-home'];

function t(k){ return T[lang][k]||k; }
function fmt(n){ return n.toLocaleString('uz-UZ')+' so\'m'; }

// ROUTING
function goPage(id){
  const cur=document.getElementById(pageStack[pageStack.length-1]);
  const nxt=document.getElementById(id);
  if(!nxt||cur===nxt)return;
  cur.classList.add('prev');
  nxt.classList.add('active');
  pageStack.push(id);
  if(id==='pg-cart') renderCart();
  if(id==='pg-order') renderOrder();
  setTimeout(()=>cur.classList.remove('prev'),300);
}
function goBack(){
  if(pageStack.length<2)return;
  const cur=document.getElementById(pageStack.pop());
  const prev=document.getElementById(pageStack[pageStack.length-1]);
  cur.classList.remove('active');
  prev.classList.remove('prev');
  prev.classList.add('active');
  setTimeout(()=>cur.classList.remove('prev'),300);
}

// LANG
function toggleLang(){
  lang=lang==='uz'?'ru':'uz';
  document.getElementById('langBtn').textContent=lang==='uz'?'RU':'UZ';
  applyLang(); renderCats(); renderMenu(); renderCartBar();
}
function applyLang(){
  document.getElementById('hero-sub').textContent=t('heroSub');
  document.getElementById('hero-tag').textContent=t('heroTag');
  document.getElementById('searchInput').placeholder=t('search');
  document.getElementById('hdr-cart-lbl').textContent='Savatcha';
  document.getElementById('barBtn').textContent=t('cartBarBtn');
  document.getElementById('cart-hdr-title').textContent=t('cartHdr');
  document.getElementById('order-hdr-title').textContent=t('orderHdr');
  document.getElementById('lbl-phone').textContent=t('phone');
  document.getElementById('lbl-address').textContent=t('address');
  document.getElementById('lbl-comment').textContent=t('comment');
  document.getElementById('place-btn').textContent=t('placeOrder');
  document.getElementById('suc-ttl').textContent=t('sucTitle');
  document.getElementById('suc-txt').textContent=t('sucText');
  document.getElementById('suc-btn').textContent=t('sucBtn');
}

// CATS
function renderCats(){
  document.getElementById('catsList').innerHTML=CATS.map(c=>`
    <div class="cat-pill ${activeCat===c.id?'on':''}" onclick="selectCat('${c.id}')">
      ${lang==='uz'?c.uz:c.ru}
    </div>`).join('');
}
function selectCat(id){
  activeCat=id;
  const cat=CATS.find(c=>c.id===id);
  document.getElementById('secTitle').textContent=id==='all'?t('allItems'):(lang==='uz'?cat.uz:cat.ru);
  document.getElementById('searchInput').value='';
  renderCats(); renderMenu();
}

// MENU
function filterMenu(){ renderMenu(document.getElementById('searchInput').value.toLowerCase()); }
function renderMenu(search=''){
  let items=activeCat==='all'?MENU:MENU.filter(m=>m.cat===activeCat);
  if(search) items=items.filter(m=>
    m.uz.toLowerCase().includes(search)||m.ru.toLowerCase().includes(search)||
    m.duz.toLowerCase().includes(search)||m.dru.toLowerCase().includes(search)
  );
  document.getElementById('menuGrid').innerHTML=items.map(item=>{
    const qty=cart[item.id]||0;
    const name=lang==='uz'?item.uz:item.ru;
    return `
    <div class="pcard" onclick="openDetail(${item.id})">
      <div class="pcard-img">${item.e}${qty>0?`<div class="pcard-badge">${qty}</div>`:''}</div>
      <div class="pcard-body">
        <div class="pcard-name">${name}</div>
        <div class="pcard-desc">${lang==='uz'?item.duz:item.dru}</div>
        <div class="pcard-foot">
          <div class="pcard-price">${fmt(item.p)}</div>
          ${qty===0
            ?`<button class="add-btn" onclick="event.stopPropagation();quickAdd(${item.id})">+</button>`
            :`<div class="qty-ctrl" onclick="event.stopPropagation()">
                <button class="qty-btn qty-minus" onclick="qtyChange(${item.id},-1)">−</button>
                <span class="qty-num">${qty}</span>
                <button class="qty-btn qty-plus" onclick="qtyChange(${item.id},1)">+</button>
              </div>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

// CART
function quickAdd(id){ cart[id]=(cart[id]||0)+1; renderMenu(); renderCartBar(); showToast(t('added')); }
function qtyChange(id,d){ const n=(cart[id]||0)+d; if(n<=0)delete cart[id]; else cart[id]=n; renderMenu(); renderCartBar(); }
function getCount(){ return Object.values(cart).reduce((a,b)=>a+b,0); }
function getTotal(){ return Object.entries(cart).reduce((s,[id,q])=>{ const m=MENU.find(x=>x.id==id); return s+(m?m.p*q:0); },0); }

function renderCartBar(){
  const cnt=getCount(), tot=getTotal();
  const bar=document.getElementById('cartBar');
  const badge=document.getElementById('hdr-badge');
  if(cnt===0){ bar.classList.remove('show'); badge.style.display='none'; return; }
  bar.classList.add('show');
  badge.style.display='flex'; badge.textContent=cnt;
  document.getElementById('barCnt').textContent=`${cnt} ${t('items')}`;
  document.getElementById('barTot').textContent=fmt(tot);
}

function renderCart(){
  const body=document.getElementById('cartBody');
  const cnt=getCount(), tot=getTotal();
  document.getElementById('cart-hdr-title').textContent=t('cartHdr');
  if(cnt===0){
    body.innerHTML=`<div class="empty-cart"><span class="ei">🛒</span><p style="font-size:17px;font-weight:800;margin-bottom:6px">${t('emptyCart')}</p><p>${t('emptyCartSub')}</p><button class="go-btn" onclick="goBack()">${t('goMenu')}</button></div>`;
    return;
  }
  const rows=Object.entries(cart).map(([id,qty])=>{
    const m=MENU.find(x=>x.id==id);
    return `<div class="cart-item">
      <div class="ci-icon">${m.e}</div>
      <div class="ci-info">
        <div class="ci-name">${lang==='uz'?m.uz:m.ru}</div>
        <div class="ci-price">${fmt(m.p*qty)}</div>
      </div>
      <div class="ci-ctrl">
        <button class="ci-btn ci-minus" onclick="cartChange(${m.id},-1)">−</button>
        <span class="ci-num">${qty}</span>
        <button class="ci-btn ci-plus" onclick="cartChange(${m.id},1)">+</button>
      </div>
    </div>`;
  }).join('');
  body.innerHTML=`<div style="height:14px"></div>${rows}
    <div class="cart-summary">
      <div class="cs-row"><span>${t('subtotal')}</span><span>${fmt(tot)}</span></div>
      <div class="cs-row"><span>${t('delivery')}</span><span>${t('free')}</span></div>
      <div class="cs-total"><span>${t('total')}</span><span>${fmt(tot)}</span></div>
    </div>
    <button class="checkout-btn" onclick="goPage('pg-order')">${t('checkout')}</button>
    <button class="clear-btn" onclick="clearCart()">${t('clearCart')}</button>`;
}
function cartChange(id,d){ const n=(cart[id]||0)+d; if(n<=0)delete cart[id]; else cart[id]=n; renderCart(); renderCartBar(); renderMenu(); }
function clearCart(){ cart={}; renderCart(); renderCartBar(); renderMenu(); }

// DETAIL
function openDetail(id){
  const m=MENU.find(x=>x.id===id); if(!m)return;
  pdProduct=m; pdQty=cart[id]||1;
  document.getElementById('pd-hdr-title').textContent=lang==='uz'?m.uz:m.ru;
  document.getElementById('pd-img').textContent=m.e;
  document.getElementById('pd-name').textContent=lang==='uz'?m.uz:m.ru;
  document.getElementById('pd-desc').textContent=lang==='uz'?m.duz:m.dru;
  document.getElementById('pd-price').textContent=fmt(m.p);
  document.getElementById('pd-num').textContent=pdQty;
  document.getElementById('pd-add-btn').textContent=`${t('addToCart')} — ${fmt(m.p*pdQty)}`;
  goPage('pg-detail');
}
function pdChange(d){ pdQty=Math.max(1,pdQty+d); document.getElementById('pd-num').textContent=pdQty; document.getElementById('pd-add-btn').textContent=`${t('addToCart')} — ${fmt(pdProduct.p*pdQty)}`; }
function pdAddToCart(){ cart[pdProduct.id]=pdQty; renderCartBar(); renderMenu(); showToast(t('added')); goBack(); }

// ORDER
function renderOrder(){
  document.getElementById('order-hdr-title').textContent=t('orderHdr');
  document.getElementById('lbl-phone').textContent=t('phone');
  document.getElementById('lbl-address').textContent=t('address');
  document.getElementById('lbl-comment').textContent=t('comment');
  document.getElementById('place-btn').textContent=t('placeOrder');
  const tot=getTotal();
  let rows=Object.entries(cart).map(([id,qty])=>{
    const m=MENU.find(x=>x.id==id);
    return `<div class="oip-row"><span>${m.e} ${lang==='uz'?m.uz:m.ru} ×${qty}</span><span>${fmt(m.p*qty)}</span></div>`;
  }).join('');
  rows+=`<div class="oip-total"><span>${t('total')}</span><span>${fmt(tot)}</span></div>`;
  document.getElementById('oip').innerHTML=rows;
}
function placeOrder(){
  const ph=document.getElementById('inp-phone').value.trim();
  const ad=document.getElementById('inp-address').value.trim();
  if(!ph){showToast(t('fillPhone'));return;}
  if(!ad){showToast(t('fillAddress'));return;}

  const orderData = JSON.stringify({
    items: Object.entries(cart).map(([id,qty])=>{
      const m=MENU.find(x=>x.id==id);
      return {id:parseInt(id), name_uz:m.uz, name_ru:m.ru, emoji:m.e, qty:qty, price:m.p};
    }),
    total: getTotal(),
    phone: ph,
    address: ad,
    comment: document.getElementById('inp-comment').value.trim()
  });

  console.log('sendData chaqirilmoqda:', orderData);

  const tg = window.Telegram && window.Telegram.WebApp;
  if(tg){
    try {
      tg.sendData(orderData);
      console.log('sendData muvaffaqiyatli!');
    } catch(e) {
      console.error('sendData xato:', e);
      alert('Xatolik: ' + e.message);
      return;
    }
  } else {
    console.warn('Telegram WebApp topilmadi!');
    alert('Telegram orqali oching!');
    return;
  }

  cart={}; renderCartBar(); renderMenu();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active','prev'));
  document.getElementById('pg-success').classList.add('active');
  pageStack=['pg-home','pg-success'];
  document.getElementById('suc-ttl').textContent=t('sucTitle');
  document.getElementById('suc-txt').textContent=t('sucText');
  document.getElementById('suc-btn').textContent=t('sucBtn');
}
function resetOrder(){
  cart={};
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active','prev'));
  document.getElementById('pg-home').classList.add('active');
  pageStack=['pg-home'];
  ['inp-phone','inp-address','inp-comment'].forEach(id=>document.getElementById(id).value='');
  renderCartBar(); renderMenu();
}

// TOAST
function showToast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2000); }

// INIT
if(window.Telegram?.WebApp){ window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
applyLang(); renderCats(); renderMenu();
</script>
